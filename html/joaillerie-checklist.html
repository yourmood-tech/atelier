<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Checklist Mood Joaillerie — Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --or: #b88a4a; --noir: #1a1410; --gris: #6b6259; --fond: #fdfaf3; --vert: #2c5530; --rouge: #a32020; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; max-width: 1100px; margin: 0 auto; padding: 1.5rem; background: var(--fond); color: var(--noir); }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 2.5rem; margin: 0 0 0.3rem; font-style: italic; }
    .sub { color: var(--gris); font-size: 0.9rem; margin: 0 0 1.5rem; font-style: italic; }
    .stats-bar { background: white; border: 1px solid #eadfc8; border-radius: 8px; padding: 0.8rem 1.2rem; margin-bottom: 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; font-size: 0.9rem; }
    .stats-bar span { color: var(--gris); }
    .stats-bar strong { color: var(--or); font-size: 1.05rem; }
    .stats-bar button { margin-left: auto; background: #fff; color: var(--gris); border: 1px solid #ccc; padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.82rem; cursor: pointer; font-family: inherit; }
    .stats-bar button:hover { color: var(--rouge); border-color: var(--rouge); }
    .section { background: white; border: 1px solid #eadfc8; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .section-header { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.2rem; cursor: pointer; user-select: none; background: linear-gradient(180deg, #fff 0%, #fcf7ee 100%); transition: background 0.2s; }
    .section-header:hover { background: #f8f4eb; }
    .section-header .chevron { font-size: 0.9rem; color: var(--gris); transition: transform 0.2s; }
    .section.open .section-header .chevron { transform: rotate(90deg); }
    .section-header h2 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 1.5rem; margin: 0; font-style: italic; flex: 1; }
    .section-count { color: var(--gris); font-size: 0.85rem; }
    .section-count .ok { color: var(--vert); font-weight: 600; }
    .section-body { display: none; padding: 0.5rem 1.2rem 1rem; }
    .section.open .section-body { display: block; }
    .produit { display: grid; grid-template-columns: 1fr auto auto auto 30px; gap: 0.8rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #f5ecd8; font-size: 0.9rem; }
    .produit:last-child { border-bottom: 0; }
    .produit input[type="text"] { padding: 0.4rem 0.6rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; font-family: inherit; background: white; width: 100%; }
    .produit.done input[type="text"] { color: var(--gris); text-decoration: line-through; background: #f9f7f0; }
    .checkbox-cell { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; user-select: none; font-size: 0.78rem; color: var(--gris); white-space: nowrap; }
    .checkbox-cell input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--vert); margin: 0; }
    .checkbox-cell.checked { color: var(--vert); font-weight: 600; }
    .btn-supprimer { background: transparent; border: 0; color: #ccc; cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.5rem; }
    .btn-supprimer:hover { color: var(--rouge); }
    .btn-ajouter { background: #fff8f0; color: var(--or); border: 1px dashed var(--or); padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-family: inherit; margin-top: 0.5rem; }
    .btn-ajouter:hover { background: var(--or); color: white; }
    @media (max-width: 700px) {
      .produit { grid-template-columns: 1fr; gap: 0.4rem; padding: 0.7rem 0; }
      .checkbox-cell { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <h1>Checklist Mood Joaillerie</h1>
  <p class="sub">Menu propre 2026 · Sauvegardée automatiquement dans ce navigateur · Aucune dépendance Shopify</p>

  <div class="stats-bar">
    <span>Total produits : <strong id="total-count">0</strong></span>
    <span>Créés : <strong id="cree-count">0</strong></span>
    <span>Photos OK : <strong id="photo-count">0</strong></span>
    <span>En ligne : <strong id="online-count">0</strong></span>
    <button onclick="exporterJSON()" title="Télécharger un backup">⬇️ Export</button>
    <button onclick="reinitTout()" title="Tout effacer (avec confirmation)">🗑 Reset</button>
  </div>

  <div id="sections-zone"></div>

<script>
const STORAGE_KEY = 'mj-checklist-v1';

// Structure menu propre 2026 (sous-menus inclus)
const MENU_2026 = [
  { id: 'coffrets', label: 'Coffrets', sousLabel: '' },
  { id: 'bases-serties', label: 'Composer ma bague › Bases serties', sousLabel: 'Composer ma bague ▼' },
  { id: 'mini-medium-sertis', label: 'Composer ma bague › Mini & medium sertis', sousLabel: 'Composer ma bague ▼' },
  { id: 'or-gris', label: 'Composer ma bague › Or gris', sousLabel: 'Composer ma bague ▼' },
  { id: 'pieces-exception', label: 'Composer ma bague › Pièces d\'exception', sousLabel: 'Composer ma bague ▼' },
  { id: 'alliances-perso', label: 'Alliances › Personnalisées sur mesure', sousLabel: 'Alliances ▼' },
  { id: 'alliances-renouvellement', label: 'Alliances › Renouvellement de vœux', sousLabel: 'Alliances ▼' },
  { id: 'fiancailles', label: 'Fiançailles', sousLabel: '' },
  { id: 'yarrow', label: 'Yarrow', sousLabel: '' },
  { id: 'piece-unique', label: 'Pièce unique', sousLabel: '' },
  { id: 'dernieres-pieces', label: 'Dernières pièces', sousLabel: '' },
  { id: 'boutiques', label: 'Boutiques', sousLabel: '' },
];

// État : { sectionId: [{nom, cree, photo, online}] }
let ETAT = lireEtat();

function lireEtat() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function sauverEtat() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ETAT)); }
  catch (e) { alert('Erreur sauvegarde : ' + e.message); }
}

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function ajouterProduit(sectionId) {
  if (!ETAT[sectionId]) ETAT[sectionId] = [];
  ETAT[sectionId].push({ nom: '', cree: false, photo: false, online: false });
  sauverEtat();
  rendre();
  // Focus le dernier input ajouté
  setTimeout(() => {
    const inputs = document.querySelectorAll(`.section[data-id="${sectionId}"] .produit input[type="text"]`);
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function supprimerProduit(sectionId, idx) {
  if (!confirm('Supprimer cette ligne ?')) return;
  ETAT[sectionId].splice(idx, 1);
  sauverEtat();
  rendre();
}

function setNom(sectionId, idx, val) {
  ETAT[sectionId][idx].nom = val;
  sauverEtat();
  // Pas de rendre() ici (casserait le focus) — juste update count
  actualiserStats();
}

function toggleCheck(sectionId, idx, champ) {
  ETAT[sectionId][idx][champ] = !ETAT[sectionId][idx][champ];
  sauverEtat();
  rendre();
}

function compterSection(sectionId) {
  const arr = ETAT[sectionId] || [];
  const total = arr.length;
  const done = arr.filter(p => p.cree && p.photo && p.online).length;
  return { total, done };
}

function actualiserStats() {
  let total = 0, cree = 0, photo = 0, online = 0;
  Object.values(ETAT).forEach(arr => {
    (arr || []).forEach(p => {
      if (p.nom.trim()) {
        total++;
        if (p.cree) cree++;
        if (p.photo) photo++;
        if (p.online) online++;
      }
    });
  });
  document.getElementById('total-count').textContent = total;
  document.getElementById('cree-count').textContent = cree;
  document.getElementById('photo-count').textContent = photo;
  document.getElementById('online-count').textContent = online;
}

function rendre() {
  const z = document.getElementById('sections-zone');
  const ouvertes = new Set([...document.querySelectorAll('.section.open')].map(s => s.dataset.id));
  z.innerHTML = MENU_2026.map(s => {
    const items = ETAT[s.id] || [];
    const stats = compterSection(s.id);
    const isOpen = ouvertes.has(s.id) || stats.total > 0;
    return `
      <div class="section ${isOpen ? 'open' : ''}" data-id="${s.id}">
        <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="chevron">▶</span>
          <h2>${s.label}</h2>
          <span class="section-count">${stats.total > 0 ? `<span class="ok">${stats.done}</span> / ${stats.total} prêts` : 'vide'}</span>
        </div>
        <div class="section-body">
          ${items.map((p, idx) => {
            const done = p.cree && p.photo && p.online;
            return `
              <div class="produit ${done ? 'done' : ''}">
                <input type="text" placeholder="Nom du produit à créer…" value="${escapeHtml(p.nom)}" oninput="setNom('${s.id}', ${idx}, this.value)">
                <label class="checkbox-cell ${p.cree ? 'checked' : ''}">
                  <input type="checkbox" ${p.cree ? 'checked' : ''} onchange="toggleCheck('${s.id}', ${idx}, 'cree')">
                  Créé
                </label>
                <label class="checkbox-cell ${p.photo ? 'checked' : ''}">
                  <input type="checkbox" ${p.photo ? 'checked' : ''} onchange="toggleCheck('${s.id}', ${idx}, 'photo')">
                  Photo
                </label>
                <label class="checkbox-cell ${p.online ? 'checked' : ''}">
                  <input type="checkbox" ${p.online ? 'checked' : ''} onchange="toggleCheck('${s.id}', ${idx}, 'online')">
                  En ligne
                </label>
                <button class="btn-supprimer" onclick="supprimerProduit('${s.id}', ${idx})" title="Supprimer">×</button>
              </div>`;
          }).join('')}
          <button class="btn-ajouter" onclick="ajouterProduit('${s.id}')">+ Ajouter un produit</button>
        </div>
      </div>
    `;
  }).join('');
  actualiserStats();
}

function exporterJSON() {
  const blob = new Blob([JSON.stringify(ETAT, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `checklist-mood-joaillerie-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function reinitTout() {
  if (!confirm('⚠️ Effacer TOUTE la checklist ? Cette action est irréversible.')) return;
  if (!confirm('Vraiment sûre ? Toutes les lignes seront perdues.')) return;
  ETAT = {};
  sauverEtat();
  rendre();
}

window.addEventListener('DOMContentLoaded', rendre);
</script>
</body>
</html>

<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projets joaillerie — demandes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box} body{font-family:'Inter',system-ui,sans-serif;color:#2a221a;background:#f3ece0;margin:0;padding:1.5rem}
.head{max-width:900px;margin:0 auto 1rem} a.retour{color:#8a5a00;text-decoration:none;font-size:.85rem}
h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:2rem;margin:.2rem 0}
.count{color:#7a6a52;font-size:.9rem}
.card{max-width:900px;margin:0 auto 1.2rem;background:#fff;border:1px solid #ecdcbf;border-radius:12px;padding:1.4rem 1.6rem}
.ch{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #e2d4ba;padding-bottom:.7rem;margin-bottom:.8rem;gap:1rem;flex-wrap:wrap}
.ch h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:500;margin:0}
.ch a{color:#8a5a00;text-decoration:none;font-size:.88rem}
.budget{background:#fff3dc;color:#8a5a00;font-weight:600;padding:.3rem .7rem;border-radius:14px;font-size:.85rem;white-space:nowrap}
.date{font-size:.74rem;color:#a8946e}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .9rem;font-size:.88rem}
.f{padding:.2rem 0}.f .k{color:#9a8a6e;font-size:.74rem}.f .v{}
.full{grid-column:1/-1}
.histoire{background:#f7efe0;border-left:3px solid #c9a85a;border-radius:0 8px 8px 0;padding:.6rem .9rem;font-style:italic;color:#3a2f22;margin:.5rem 0}
.imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.5rem;margin-top:.6rem}
.imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid #e2d4ba;cursor:pointer}
.chiplist span{display:inline-block;background:#f0e6d2;border-radius:12px;padding:.1rem .5rem;margin:.1rem .12rem;font-size:.8rem}
.vide{max-width:900px;margin:2rem auto;text-align:center;color:#9a8a6e}
.search{max-width:900px;margin:0 auto 1rem;display:block;width:100%;padding:.6rem .8rem;border:1px solid #ddd;border-radius:8px;font-size:.95rem}
</style></head><body>
<div class="head">
  <a class="retour" href="/">← Atelier</a>
  <h1>💎 Demandes de projet joaillerie</h1>
  <div class="count" id="count"></div>
</div>
<input class="search" id="search" placeholder="🔍 chercher (prénom, email, thème…)" oninput="render()">
<div id="liste"></div>

<script>
const DEMANDES = /*__DEMANDES__*/;
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){ try{return new Date(iso).toLocaleString('fr-CH');}catch(e){return '';} }
function chips(arr){ return (arr&&arr.length)?'<span class="chiplist">'+arr.map(x=>`<span>${esc(x)}</span>`).join('')+'</span>':'—'; }
function f(k,v){ return `<div class="f"><div class="k">${k}</div><div class="v">${v||'—'}</div></div>`; }

function card(d){
  const imgs=(d.images&&d.images.length)?`<div class="imgs">${d.images.map(u=>`<img src="${u}" onclick="window.open('${u}')">`).join('')}</div>`:'';
  const histoire=d.histoire?`<div class="histoire">💌 ${esc(d.histoire)}</div>`:'';
  return `<div class="card">
    <div class="ch"><div><h2>${esc(d.prenom)||'—'}</h2><a href="mailto:${esc(d.email)}">${esc(d.email)}</a><div class="date">${fmtDate(d.date)}</div></div>
      <div class="budget">Budget : ${esc(d.budget)||'—'}</div></div>
    <div class="grid">
      ${f('Matière', esc(d.matiere))}
      ${f('Couleur matière', esc(d.couleurMatiere))}
      ${f('Finition', esc(d.finition))}
      ${f('Gravé / texture', esc(d.grave))}
      ${f('Format', esc(d.format)+(d.formatPrecision?(' — '+esc(d.formatPrecision)):''))}
      ${f('Pierres', chips(d.pierres))}
      ${f('Tonalité couleur', chips(d.tonalite))}
      ${f('Taille des pierres', esc(d.taillePierre))}
      ${f('Style', chips(d.style))}
      ${f('Thème', esc(d.theme))}
      ${f('Occasion', esc(d.occasion))}
      ${d.autre?('<div class="full">'+f('Autre', esc(d.autre))+'</div>'):''}
    </div>
    ${histoire}
    ${imgs}
  </div>`;
}
function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const list=DEMANDES.filter(d=>!q || JSON.stringify({p:d.prenom,e:d.email,t:d.theme,h:d.histoire}).toLowerCase().includes(q));
  document.getElementById('count').textContent = `${DEMANDES.length} demande${DEMANDES.length>1?'s':''}`;
  document.getElementById('liste').innerHTML = list.length ? list.map(card).join('')
    : '<div class="vide">Aucune demande pour le moment. Partage le lien <strong>/projet-joaillerie</strong> à tes clientes.</div>';
}
render();
</script>
</body></html>

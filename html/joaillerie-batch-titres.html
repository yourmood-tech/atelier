// État local : modifs + exclusions
const ETAT = DATA.map((u, i) => ({ ...u, idx: i, exclu: false, titreLive: u.nouveau }));

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function rendreLigne(item) {
  const cls = 'ligne' + (item.exclu ? ' exclu' : '') + (item.titreLive !== item.nouveau ? ' modif' : '');
  return `<div class="${cls}" data-idx="${item.idx}">
    <div class="num">${item.idx + 1}</div>
    <div class="ancien">${escapeHtml(item.ancien)}</div>
    <div>
      <input type="text" class="nouveau-input" value="${escapeHtml(item.titreLive)}" 
        oninput="onChange(${item.idx}, this.value)" 
        ${item.exclu ? 'disabled' : ''} 
        title="Handle: ${escapeHtml(item.handle)}">
      <div style="font-size:0.7rem;color:var(--gris);margin-top:0.2rem;">${escapeHtml(item.handle)}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.2rem;">
      <button class="reset" onclick="reset(${item.idx})" title="Revenir au titre actuel Shopify">↶ Reset</button>
      <button class="reset" onclick="toggleExclu(${item.idx})" title="Exclure ce produit">${item.exclu ? '☐ Inclure' : '⊘ Exclure'}</button>
    </div>
  </div>`;
}

function rendreListe() {
  const search = document.getElementById('search').value.toLowerCase();
  const liste = document.getElementById('liste');
  const filtres = search ? ETAT.filter(x => 
    x.ancien.toLowerCase().includes(search) || 
    x.titreLive.toLowerCase().includes(search) || 
    x.handle.toLowerCase().includes(search)
  ) : ETAT;
  liste.innerHTML = filtres.map(rendreLigne).join('');
  document.getElementById('inclus-count').textContent = ETAT.filter(x => !x.exclu).length;
  document.getElementById('modif-count').textContent = ETAT.filter(x => x.titreLive !== x.nouveau).length;
}

function onChange(idx, val) { ETAT[idx].titreLive = val; rendreListe(); }
function reset(idx) { ETAT[idx].titreLive = ETAT[idx].ancien; rendreListe(); }
function toggleExclu(idx) { ETAT[idx].exclu = !ETAT[idx].exclu; rendreListe(); }
function excluTous() { ETAT.forEach(x => x.exclu = true); rendreListe(); }
function inclureTous() { ETAT.forEach(x => x.exclu = false); rendreListe(); }
function filtrer() { rendreListe(); }

async function lancer(dryRun, seulementFiltres) {
  const search = document.getElementById('search').value.toLowerCase();
  let pool = ETAT.filter(x => !x.exclu && x.titreLive.trim() && x.titreLive !== x.ancien);
  if (seulementFiltres && search) {
    pool = pool.filter(x =>
      x.ancien.toLowerCase().includes(search) ||
      x.titreLive.toLowerCase().includes(search) ||
      x.handle.toLowerCase().includes(search)
    );
  }
  const inclus = pool;
  if (inclus.length === 0) {
    alert(seulementFiltres ? 'Aucun titre filtré à modifier. Vérifie le filtre de recherche.' : 'Aucun titre à modifier (tout est exclu ou identique à l\'ancien).');
    return;
  }
  const scope = seulementFiltres ? `${inclus.length} titres filtrés (recherche: "${search}")` : `${inclus.length} titres`;
  if (!dryRun && !confirm(`⚠️ Tu vas modifier ${scope} sur Mood Joaillerie. Continuer ?`)) return;
  const btn = dryRun ? document.getElementById('btn-dry') : (seulementFiltres ? document.getElementById('btn-apply-filtres') : document.getElementById('btn-apply'));
  const old = btn.textContent;
  btn.disabled = true;
  btn.textContent = dryRun ? '⏳ Simulation…' : '⏳ Push…';
  const pz = document.getElementById('progress-zone');
  pz.style.display = 'block';
  document.getElementById('progress-text').textContent = (dryRun ? 'Simulation' : 'Push') + ' de ' + inclus.length + ' produits…';
  document.getElementById('progress-bar').style.width = '20%';
  const res = document.getElementById('resultat'); res.className = 'resultat hidden';
  try {
    const r = await fetch('/api/joaillerie/batch-update-titres', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        store: 'mood-joaillerie',
        updates: inclus.map(x => ({ id: x.id, title: x.titreLive.trim() })),
        dryRun: dryRun,
      })
    });
    document.getElementById('progress-bar').style.width = '100%';
    const data = await r.json();
    if (!r.ok) { res.className = 'resultat ko'; res.textContent = 'Erreur : ' + (data.error || 'inconnue'); return; }
    res.className = 'resultat ok';
    let msg = '<strong>' + (dryRun ? '🧪 Dry-run terminé' : '✅ Push terminé') + '</strong> · Total: ' + data.total + ' · Succès: ' + data.succes + ' · Échecs: ' + data.echecs;
    if (data.echecs > 0) {
      msg += '<br><strong>Échecs :</strong><ul style="margin:0.4rem 0;">';
      data.results.filter(r => !r.ok).slice(0, 10).forEach(r => { msg += '<li>id=' + r.id + ' : ' + (r.error || 'status ' + r.status) + '</li>'; });
      msg += '</ul>';
    }
    res.innerHTML = msg;
  } catch (e) {
    res.className = 'resultat ko'; res.textContent = 'Erreur réseau : ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = old;
    setTimeout(() => { pz.style.display = 'none'; }, 2000);
  }
}

window.addEventListener('DOMContentLoaded', rendreListe);
</script>

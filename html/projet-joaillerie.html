<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ton projet joaillerie — Mood</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0e;--bg2:#141318;--gold:#cBa25a;--gold:#c9a25a;--gold-soft:#d8b56a;--ivory:#f3eee2;--muted:#8c8576;--line:rgba(201,162,90,.28)}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 100% at 50% 0%, #1a1820 0%, var(--bg) 55%);color:var(--ivory);min-height:100%;overflow-x:hidden}
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-soft));width:0;transition:width .5s cubic-bezier(.4,0,.2,1);z-index:10;box-shadow:0 0 12px rgba(201,162,90,.6)}
.brand{position:fixed;top:1.1rem;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;letter-spacing:.08em;color:var(--gold);z-index:5;opacity:.85}
.stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:5rem 1.4rem 3rem}
.card{width:100%;max-width:560px}
.screen{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease}
.screen.in{opacity:1;transform:none}
.eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;text-align:center}
.q{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:2rem;line-height:1.25;text-align:center;margin-bottom:.6rem}
.qsub{text-align:center;color:var(--muted);font-size:.92rem;margin-bottom:1.8rem;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:.6rem}
.choices.wrap{flex-direction:row;flex-wrap:wrap;justify-content:center}
.choice{position:relative;border:1px solid var(--line);background:rgba(255,255,255,.025);color:var(--ivory);padding:.95rem 1.2rem;border-radius:14px;font-size:1rem;cursor:pointer;transition:.25s;text-align:center;font-family:inherit}
.choices.wrap .choice{flex:0 1 auto}
.choice:hover{border-color:var(--gold);background:rgba(201,162,90,.08);transform:translateY(-1px)}
.choice.sel{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#1a140a;border-color:transparent;font-weight:600;box-shadow:0 6px 22px rgba(201,162,90,.3)}
.choice.sel::after{content:'✦';position:absolute;right:.8rem;top:50%;transform:translateY(-50%);font-size:.8rem}
input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;color:var(--ivory);font-family:inherit;font-size:1.05rem;padding:1rem 1.1rem;outline:none;transition:.25s}
input:focus,textarea:focus{border-color:var(--gold);background:rgba(201,162,90,.06)}
input::placeholder,textarea::placeholder{color:#6a655a}
textarea{min-height:120px;resize:vertical;font-size:1rem}
.budget-num{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold-soft);text-align:center;margin:.4rem 0 1.2rem}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:linear-gradient(90deg,var(--gold) 0%, var(--gold) 50%, rgba(255,255,255,.12) 50%);border-radius:4px;padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-soft));cursor:pointer;box-shadow:0 0 14px rgba(201,162,90,.6);border:2px solid #1a140a}
.rangelbl{display:flex;justify-content:space-between;color:var(--muted);font-size:.78rem;margin-top:.5rem}
.btn{display:block;width:100%;margin-top:1.8rem;padding:1rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#1a140a;font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer;transition:.25s;box-shadow:0 8px 26px rgba(201,162,90,.28)}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(201,162,90,.4)}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--muted);box-shadow:none;font-weight:500;margin-top:.8rem}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.note{font-size:.78rem;color:var(--muted);text-align:center;margin-top:.9rem;font-style:italic}
.back{position:fixed;top:1rem;left:1rem;background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;z-index:6}
.back:hover{color:var(--gold)}
/* images */
.dz{border:1.5px dashed var(--line);border-radius:16px;padding:2rem 1rem;text-align:center;color:var(--muted);cursor:pointer;transition:.25s}
.dz:hover{border-color:var(--gold);background:rgba(201,162,90,.05);color:var(--gold-soft)}
.dz .big{font-size:1.6rem;color:var(--gold);margin-bottom:.3rem}
.gal{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.9rem}
.gal .cell{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.gal img{width:100%;height:100%;object-fit:cover}
.gal .del{position:absolute;top:.25rem;right:.25rem;background:rgba(12,12,14,.8);border:1px solid var(--line);color:var(--gold-soft);border-radius:50%;width:24px;height:24px;cursor:pointer}
/* intro / merci */
.center{text-align:center}
.big-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:2.6rem;line-height:1.15;margin-bottom:1rem}
.lead{color:var(--muted);font-size:1rem;line-height:1.6;max-width:440px;margin:0 auto 1.5rem}
.sparkle{font-size:2rem;color:var(--gold);margin-bottom:1rem;display:block}
.finbox{border:1px solid var(--line);border-radius:14px;padding:1rem 1.2rem;font-size:.84rem;color:var(--muted);line-height:1.55;margin-top:1.4rem;text-align:left}
.finbox b{color:var(--ivory)}
</style></head><body>
<div class="progress" id="prog"></div>
<div class="brand">M O O D · joaillerie</div>
<button class="back" id="backbtn" onclick="prev()" style="display:none">← retour</button>
<div class="stage"><div class="card"><div id="screen" class="screen"></div></div></div>

<script>
const ST = { prenom:'',email:'',budget:1500,matiere:'',matiereAutre:'',couleurMatiere:'',finition:'',finitionAutre:'',grave:'',pierres:[],tonalite:[],pierreCouleur:'',format:'',formatQte:'',largeur:'',style:[],theme:'',histoire:'',occasion:'',autre:'',images:[] };

const SCREENS = [
 { type:'intro' },
 { type:'text', key:'prenom', eyebrow:'Faisons connaissance', q:'Comment t’appelles-tu ?', placeholder:'Ton prénom', required:true },
 { type:'email', key:'email', eyebrow:'Pour t’envoyer ton projet', q:'Et ton email ?', placeholder:'ton@email.com', required:true },
 { type:'budget', key:'budget', eyebrow:'Sans tabou', q:'Quel budget imagines-tu ?', sub:'À partir de 500.- — glisse à ton aise.' },
 { type:'single', key:'matiere', eyebrow:'La matière', q:'Dans quelle matière la rêves-tu ?', options:['Or','Argent','Autre'] },
 { type:'text', key:'matiereAutre', q:'Quelle matière ?', placeholder:'Dis-nous…', showIf:s=>s.matiere==='Autre' },
 { type:'single', key:'couleurMatiere', eyebrow:'La couleur de l’or', q:'Quel or te fait vibrer ?', options:['Jaune','Gris','Rose'], showIf:s=>s.matiere==='Or' },
 { type:'single', key:'couleurMatiere', eyebrow:'L’argent', q:'Plutôt…', options:['Oxygéné','Neutre'], showIf:s=>s.matiere==='Argent' },
 { type:'single', key:'finition', eyebrow:'La texture', q:'Quelle finition pour ta pièce ?', options:['Poli','Mixte','Froissé','Paillette','Martelé','Incurvé','Clawgrunge','Cristal de givre','Matt','Autre'], wrap:true },
 { type:'text', key:'finitionAutre', q:'Précise ta finition', placeholder:'Ta texture idéale…', showIf:s=>s.finition==='Autre' },
 { type:'single', key:'grave', eyebrow:'Le détail', q:'Gravé ou texture abstraite ?', options:['Gravé','Texture abstraite'], note:'✦ Certaines textures ne peuvent pas être gravées — on te guidera.' },
 { type:'multi', key:'pierres', eyebrow:'Les pierres', q:'Quelles pierres te font rêver ?', sub:'Plusieurs choix possibles', options:['Diamant','Diamant brun','Diamant jaune pur','Diamant gris','Diamant champagne','Diamant noir','Saphir bleu','Saphir jaune','Saphir orange','Saphir violet','Saphir rose','Saphir brun','Émeraude','Topaze','Améthyste','Rubis','Je vous laisse le choix'], wrap:true },
 { type:'multi', key:'tonalite', eyebrow:'L’ambiance de couleur', q:'Une tonalité qui te parle ?', sub:'Plusieurs choix possibles', options:['Ton pastel','Multicolore','Tons froids','Tons flash','Ton neutre (noir / blanc)','Ton chaud'], wrap:true, optional:true },
 { type:'text', key:'pierreCouleur', q:'Une couleur de pierre précise en tête ?', placeholder:'Optionnel — ex : bleu London, rose…', optional:true },
 { type:'single', key:'format', eyebrow:'Le format', q:'Quel format pour ta pièce ?', options:['Addon','Deux-tiers','Medium','Mini'] },
 { type:'single', key:'formatQte', eyebrow:'Le format', q:'Combien de mediums ?', options:['1','2','3'], showIf:s=>s.format==='Medium' },
 { type:'single', key:'formatQte', eyebrow:'Le format', q:'Combien de minis ?', options:['1','2','3','4','5','6'], wrap:true, showIf:s=>s.format==='Mini' },
 { type:'single', key:'largeur', eyebrow:'La largeur', q:'Quelle largeur ?', options:['XS · 9mm','S · 11mm','L · 13mm','Je ne sais pas'] },
 { type:'multi', key:'style', eyebrow:'Le style', q:'Ton style, c’est plutôt…', sub:'Plusieurs choix possibles', options:['Abstrait','Figuratif','Géométrique','Chargé','Épuré'], wrap:true },
 { type:'text', key:'theme', eyebrow:'L’inspiration', q:'Un thème qui te ressemble ?', placeholder:'mer, fleurs, mythologie, voyage…', optional:true },
 { type:'textarea', key:'histoire', eyebrow:'Le plus important', q:'Une histoire à transmettre ? 💌', sub:'Une émotion, un symbole, une date, un être cher… C’est ce qui rend ta pièce unique.', optional:true },
 { type:'single', key:'occasion', eyebrow:'L’occasion', q:'Pour quelle occasion ?', options:['Un cadeau à moi-même','Anniversaire','Mariage / fiançailles','Naissance','Un souvenir','Juste l’envie','Autre'], wrap:true, optional:true },
 { type:'images' },
 { type:'textarea', key:'autre', eyebrow:'Carte blanche', q:'Autre chose à nous dire ?', placeholder:'Tout ce qui te passe par la tête…', optional:true },
 { type:'send' },
];

let pos = 0;
function visible(){ return SCREENS.filter(s=>!s.showIf || s.showIf(ST)); }
function esc(s){return (s==null?'':String(s)).replace(/</g,'&lt;');}

function fmtBudget(v){ return v>=10000 ? '10 000.- et +' : (v.toLocaleString('fr-CH')+'.-'); }

function render(){
  const list = visible();
  if(pos<0) pos=0; if(pos>=list.length) pos=list.length-1;
  const s = list[pos];
  const el = document.getElementById('screen');
  el.classList.remove('in');
  document.getElementById('backbtn').style.display = pos>0 ? 'block' : 'none';
  document.getElementById('prog').style.width = (pos/(list.length-1)*100)+'%';
  let html='';
  const eye = s.eyebrow?`<div class="eyebrow">${s.eyebrow}</div>`:'';
  const qsub = s.sub?`<div class="qsub">${s.sub}</div>`:'';

  if(s.type==='intro'){
    html=`<div class="center">
      <span class="sparkle">✦</span>
      <div class="big-title">Ton projet joaillerie,<br>rien que pour toi</div>
      <div class="lead">C’est un projet un peu <b style="color:var(--gold-soft)">surprise</b> : notre designer part de <b style="color:var(--gold-soft)">ton univers</b> pour imaginer une pièce qui te ressemble vraiment. Quelques questions, et on s’occupe du reste. 🫶🏼</div>
      <button class="btn" onclick="next()">Commencer ✦</button></div>`;
  }
  else if(s.type==='text'||s.type==='email'){
    html=`${eye}<div class="q">${s.q}</div>${qsub}
      <input id="inp" type="${s.type==='email'?'email':'text'}" placeholder="${s.placeholder||''}" value="${esc(ST[s.key])}" oninput="ST['${s.key}']=this.value" onkeydown="if(event.key==='Enter')next()">
      ${s.note?`<div class="note">${s.note}</div>`:''}
      <button class="btn" onclick="next()">Continuer</button>`;
  }
  else if(s.type==='textarea'){
    html=`${eye}<div class="q">${s.q}</div>${qsub}
      <textarea id="inp" placeholder="${s.placeholder||''}" oninput="ST['${s.key}']=this.value">${esc(ST[s.key])}</textarea>
      <button class="btn" onclick="next()">${s.optional?'Continuer':'Continuer'}</button>`;
  }
  else if(s.type==='budget'){
    html=`${eye}<div class="q">${s.q}</div>${qsub}
      <div class="budget-num" id="bnum">${fmtBudget(ST.budget)}</div>
      <input type="range" min="500" max="10000" step="100" value="${ST.budget}" oninput="ST.budget=+this.value;document.getElementById('bnum').textContent=fmtBudget(ST.budget);this.style.background='linear-gradient(90deg,var(--gold) '+((this.value-500)/9500*100)+'%, rgba(255,255,255,.12) '+((this.value-500)/9500*100)+'%)'">
      <div class="rangelbl"><span>500.-</span><span>10 000.- et +</span></div>
      <button class="btn" onclick="next()">Continuer</button>`;
  }
  else if(s.type==='single'){
    html=`${eye}<div class="q">${s.q}</div>${qsub}
      <div class="choices ${s.wrap?'wrap':''}">${s.options.map(o=>
        `<button class="choice ${ST[s.key]===o?'sel':''}" onclick="pick('${s.key}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
      ${s.note?`<div class="note">${s.note}</div>`:''}`;
  }
  else if(s.type==='multi'){
    html=`${eye}<div class="q">${s.q}</div>${qsub}
      <div class="choices ${s.wrap?'wrap':''}">${s.options.map(o=>
        `<button class="choice ${ST[s.key].includes(o)?'sel':''}" onclick="toggle('${s.key}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
      <button class="btn" onclick="next()">Continuer</button>`;
  }
  else if(s.type==='images'){
    html=`<div class="eyebrow">Ton univers en images</div>
      <div class="q">Montre-nous ton monde 📸</div>
      <div class="qsub">Pas seulement des bijoux — un paysage, une ambiance, des couleurs, une fleur, un lieu, une photo qui t’inspire… Plus tu en mets, plus la pièce sera toi.</div>
      <div class="dz" id="dz"><div class="big">＋</div>Ajoute tes images<br><span style="font-size:.8rem">glisser-déposer ou cliquer</span></div>
      <input type="file" id="imgfile" accept="image/*" multiple style="display:none">
      <div class="gal" id="gal"></div>
      <button class="btn" onclick="next()">Continuer</button>`;
  }
  else if(s.type==='send'){
    html=`<div class="center"><div class="eyebrow">Dernière étape</div>
      <div class="q">Prête à nous confier ton projet ?</div></div>
      <div class="finbox">📩 Ton projet te sera transmis <b>par email</b>. Laisse-nous un peu de temps : notre designer prend le temps d’<b>analyser et de penser ta pièce</b> — c’est ce qui fait sa valeur.<br><br>Si le premier projet ne te correspond pas tout à fait, on en discute et on apporte <b>une ou deux retouches</b>. Au-delà, on ne pourra pas continuer indéfiniment — mais on met tout notre cœur à viser juste dès le départ. 🫶🏼</div>
      <button class="btn" id="send" onclick="envoyer()">Envoyer mon projet ✦</button>`;
  }

  el.innerHTML = html;
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('in')));
  const inp = document.getElementById('inp'); if(inp) setTimeout(()=>inp.focus(),350);
  if(s.type==='images') initImages();
  window.scrollTo({top:0});
}

function transition(fn){
  const el=document.getElementById('screen'); el.classList.remove('in');
  setTimeout(()=>{ fn(); },300);
}
function next(){
  const list=visible(); const s=list[pos];
  // validation minimale
  if(s){ if(s.key==='prenom'&&!ST.prenom.trim()){shake();return;}
    if(s.key==='email'&&!/.+@.+\..+/.test(ST.email.trim())){shake();return;} }
  transition(()=>{ pos++; render(); });
}
function prev(){ transition(()=>{ pos--; if(pos<0)pos=0; render(); }); }
function pick(key,val){ ST[key]=val; render();
  // auto-avance après un petit délai (sensation fluide)
  setTimeout(()=>{ const el=document.getElementById('screen'); el.classList.remove('in'); setTimeout(()=>{pos++;render();},300); }, 260); }
function toggle(key,val){ const a=ST[key]; const i=a.indexOf(val); if(i>=0)a.splice(i,1); else a.push(val); render(); }
function shake(){ const inp=document.getElementById('inp'); if(inp){inp.style.borderColor='#c9554a'; inp.focus();} }

// images
function initImages(){
  const dz=document.getElementById('dz'), f=document.getElementById('imgfile');
  dz.onclick=()=>f.click();
  f.onchange=e=>handle(e.target.files);
  dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='var(--gold)';};
  dz.ondragleave=()=>dz.style.borderColor='';
  dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';handle(e.dataTransfer.files);};
  renderGal();
}
function handle(files){ [...files].forEach(file=>{ if(!file.type.startsWith('image/')||ST.images.length>=8)return;
  downscale(file,1000,.72).then(d=>{ST.images.push(d);renderGal();}); }); }
function downscale(file,max,q){return new Promise(res=>{const r=new FileReader();r.onload=()=>{const i=new Image();
  i.onload=()=>{const ra=i.width>max?max/i.width:1,w=Math.round(i.width*ra),h=Math.round(i.height*ra);
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);res(c.toDataURL('image/jpeg',q));};
  i.src=r.result;};r.readAsDataURL(file);});}
function renderGal(){const g=document.getElementById('gal');if(!g)return;
  g.innerHTML=ST.images.map((u,i)=>`<div class="cell"><img src="${u}"><button class="del" onclick="delImg(${i})">×</button></div>`).join('');}
function delImg(i){ST.images.splice(i,1);renderGal();}

async function envoyer(){
  const btn=document.getElementById('send'); btn.disabled=true; btn.textContent='Envoi…';
  const payload={
    prenom:ST.prenom.trim(), email:ST.email.trim(), budget:fmtBudget(ST.budget),
    matiere: ST.matiere==='Autre'?('Autre : '+ST.matiereAutre):ST.matiere,
    couleurMatiere:ST.couleurMatiere,
    finition: ST.finition==='Autre'?('Autre : '+ST.finitionAutre):ST.finition,
    grave:ST.grave, pierres:ST.pierres, tonalite:ST.tonalite, pierreCouleur:ST.pierreCouleur.trim(),
    format: ST.format + (ST.formatQte ? (' ×' + ST.formatQte) : ''), largeur:ST.largeur,
    style:ST.style, theme:ST.theme.trim(), histoire:ST.histoire.trim(),
    occasion:ST.occasion, autre:ST.autre.trim(), images:ST.images,
  };
  try{
    const r=await fetch('/api/projet-joaillerie-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error();
    document.getElementById('prog').style.width='100%';
    document.getElementById('backbtn').style.display='none';
    const el=document.getElementById('screen'); el.classList.remove('in');
    setTimeout(()=>{ el.innerHTML=`<div class="center"><span class="sparkle">✦</span>
      <div class="big-title">Merci 🫶🏼</div>
      <div class="lead">Ton projet est bien arrivé. Notre designer va prendre le temps de l’imaginer, et tu recevras ta proposition par email.</div></div>`;
      el.classList.add('in'); window.scrollTo({top:0}); },300);
  }catch(e){ btn.disabled=false; btn.textContent='Envoyer mon projet ✦'; alert("Oups, l'envoi a échoué. Réessaie dans un instant."); }
}
render();
</script>
</body></html>
